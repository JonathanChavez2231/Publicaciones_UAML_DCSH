# ============================================
# CONFIGURACIÓN DEL PROYECTO
# ============================================
project:
  type: book
  output-dir: _book
  render:
    - "*.qmd"

# ============================================
# METADATOS EDITORIALES Y BIBLIOGRÁFICOS
# ============================================
book:
  title: "" # Políticas Públicas y Etnografí
  subtitle: "" # Observando al Estado y como el Estado
  editor:
    - name: "Nombre del Coordinador"
      affiliation: "Institución del Coordinador"
      email: "un.correo@institución.com"
      orcid: "0000-0000-0000-0000"  # opcional pero recomendado
  publisher: "Universidad Autónoma Metropolitana, Unidad Lerma"
  publisher-place: "Lerma de Villada, Estado de México"
  date: ""  # formato ISO 8601: AAAA-MM-DD
  isbn: "978-xxx-xxx-xxx-x"
  doi: "10.xxxx/xxxxx"  # si ya está asignado
  license: "CC BY-NC-SA 4.0"  # o la que corresponda
  chapters:
    - index.qmd
    - cap1.qmd

# ============================================
# CONFIGURACIÓN DE SALIDA PDF
# ============================================
format:
  pdf:
    title-page: false
    pdf-engine: xelatex
    lang: es
    documentclass: scrbook
    papersize: "a4"
    fontsize: 11pt
    geometry: "left=3cm,right=3cm,top=3cm,bottom=4cm"
    
    # Declaramos las fuentes acá para que Quarto no use las genéricas
    mainfont: "Cormorant Garamond"

    # Aquí externalizamos los archivos
    include-in-header: 
      - latex/preambulo.tex      # Archivo con paquetes y comandos globales
      - latex/entornos.tex       # Archivo con el entorno de transcripción
    
    include-before-body: 
      - latex/portada.tex        # Tu portada personalizada (renombrada para mantener orden)

    # --- Estructura de navegación y índices ---
    toc: true
    toc-depth: 2                     # Profundidad del índice: hasta nivel de sección (1=capítulo, 2=sección).
    toc-title: "Índice"
    number-sections: false            # Activa la numeración automática de capítulos y secciones.
    lof-title: "Índice de Figuras"
    lot-title: "Índice de Tablas"
    lof: false                       # Desactivado (cambiar a true si el libro contiene figuras numeradas).
    lot: false                       # Desactivado (cambiar a true si el libro contiene tablas numeradas).

    # --- Gestión de Referencias y Citas ---
    csl: estilos/apa-6th-edition-es.csl
    # bibliography: libro1_2026.bib
    # nocite: "@*" # Descomenta esto si quieres toda la base de datos junta al final
#===============================================================================
# 1. CONFIGURACIÓN GENERAL DEL PROYECTO
#===============================================================================
# Define el tipo de salida y los archivos fuente que Quarto debe procesar.
project:
  type: book                  # Especifica que la salida es un libro (estructura multi-capítulo).
  output-dir: _book           # Directorio donde se compilarán los archivos finales (ignorado por .gitignore).
  render: 
    - "*.qmd"                 # Instruye a Quarto a renderizar todos los archivos con extensión .qmd en el directorio.

#===============================================================================
# 2. METADATOS EDITORIALES Y DE PUBLICACIÓN
#===============================================================================
# Contiene la información paratextual esencial para la catalogación y derechos de autor.
book:
  title: ""
  subtitle: ""
  editor:
    - name: "Fernando Rodrigo Beltrán Nieves"
      affiliation: "Universidad Autónoma Metropolitana, Unidad Lerma" # Sugerencia: Unificar nombre institucional.
      email: "f.beltran@correo.uam.ler.mx"
      orcid: ""                # CRÍTICO: Completar para garantizar la indexación y atribución académica correcta.
  publisher: "Universidad Autónoma Metropolitana, Unidad Lerma"
  publisher-place: "Lerma de Villada, Estado de México"
  date: ""                # Sugerencia: Usar "today" para fecha automática de compilación o formato ISO (AAAA-MM-DD).
  isbn: "978-xxx-xxx-xxx-x"    # Reemplazar con el ISBN asignado por la editorial institucional.
  doi: "10.xxxx/xxxxx"         # Reemplazar si el DOI ya ha sido asignado.
  license: "CC BY-NC-SA 4.0"   # Licencia Creative Commons (Reconocimiento-NoComercial-CompartirIgual).
  chapters:
    - index.qmd                # Portada, créditos e introducción general.
    - part: CONVERGENCIAS, ALGORITMOS Y NARRATIVAS EMERGENTES
      chapters:
        - cap1.qmd
        - cap2.qmd
        - cap3.qmd
        - cap4.qmd
        - cap5.qmd
    - part: ENTREVISTA
      chapters:
        - entrevista.qmd           # Apéndice o sección de metodologías cualitativas/transcripciones.
    - part: RESEÑAS
      chapters:
        - reseña.qmd               # Sección de cierre, anexos o estado del arte.
    - referencias.qmd

#===============================================================================
# 3. CONFIGURACIÓN DE FORMATO Y MAQUETACIÓN (PDF)
#===============================================================================
# Parámetros específicos para la generación del documento PDF vía motor LaTeX.
format:
  pdf:
    # --- Configuración básica del documento ---
    title-page: false          # Desactiva la portada automática de Quarto para usar la plantilla personalizada (portada.tex).
    pdf-engine: xelatex        # Motor recomendado para manejar fuentes del sistema de manera nativa (fontspec).
    lang: es                   # CRÍTICO: Define el idioma para paquetes como polyglossia y la localización de citas/índices.
    documentclass: scrbook     # Clase KOMA-Script, superior para maquetación de libros y control tipográfico fino.
    papersize: "a4"
    fontsize: 11pt
    geometry: "left=3cm,right=3cm,top=3cm,bottom=4cm" # Márgenes según lineamientos institucionales o de impresión.
    
    # --- Configuración tipográfica global ---
    mainfont: "Cormorant Garamond" # Fuente principal declarada aquí para evitar redundancias en el header.
    sansfont: "Montserrat"

    # Aquí externalizamos los archivos
    include-in-header: 
      - latex/preambulo.tex      # Archivo con paquetes y comandos globales
      - latex/entornos.tex       # Archivo con el entorno de transcripción



    # --- Inyección de código LaTeX en el preámbulo (Header) ---
    include-in-header:
      text: |
        % 1. Carga de fuentes y tipografía
        \usepackage{fontspec}
        \setmainfont{Cormorant Garamond}[
          UprightFont = *-Medium
        ]
        \setsansfont{Montserrat-Regular.otf}[  % <-- Poné acá el nombre del archivo común
        BoldFont = Montserrat-SemiBold.otf % <-- Poné acá el nombre del archivo seminegrita
        ]
        
        % 2. Ajustes de párrafo y espaciado vertical
        \usepackage{widows-and-orphans}
        \widowpenalty=10000
        \clubpenalty=10000
        \setlength{\parindent}{1.2em}   % Sangría de primera línea
        \setlength{\parskip}{0pt}       % Sin espacio entre párrafos
        \usepackage{setspace}
        \setstretch{1.3}                 % Interlineado dligeramente más compacto
        \addtokomafont{disposition}{\linespread{1.2}\selectfont} % Ajuste específico de KOMA para la disposición de títulos.

        % 3. Jerarquía y alineación de títulos (KOMA-Script)
        \addtokomafont{chapter}{\Large\raggedright}      % CORREGIDO: Se eliminó el espacio inadvertido en "c hapter".
        \addtokomafont{section}{\large\raggedright}
        \addtokomafont{subsection}{\normalsize}
        \RedeclareSectionCommand[                        % CORREGIDO: "Red eclare" -> "Redeclare".
          beforeskip=0.0cm,                              % Espacio antes del título de capítulo.
          afterskip=1cm                                  % Espacio después del título de capítulo.
        ]{chapter}

        % 4. Encabezados y pies de página
        \usepackage{scrlayer-scrpage}
        \automark{chapter}                               % CORREGIDO: Se eliminó el espacio inadvertido en "c hapter".

        % 5. Gestión de gráficos e imágenes
        \usepackage{graphicx}
        \graphicspath{{assets/imagenes/}{../../institucionales/assets/logos/}}

        % 6. Entornos personalizados para entrevistas y transcripciones
        \usepackage{enumitem}
        \usepackage{xcolor}
        \newenvironment{transcripcion}{                  % CORREGIDO: "transcripci on" -> "transcripcion".
          \begin{list}{}{
            \leftmargin=1em
            \rightmargin=0em
            \itemsep=0.3em
            \parsep=0.0em
            \listparindent=0pt
          }
        }{
          \end{list}
        }
        
        % 7. Comandos auxiliares para guiones o transcripciones
        \newcommand{\personaje}[1]{\textbf{#1}\quad}
        \newcommand{\escena}[1]{\textit{\small #1}\par\vspace{0.5em}}
        
        % 8. Forzaar reinicio de notas al pie en cada capítulo
        % \usepackage{chngcntr}
        % \counterwithin*{footnote}{chapter} 

    # --- Inserción de elementos antes del cuerpo del texto ---
    include-before-body: portada.tex # Llama a la plantilla de portada personalizada.

    # --- Estructura de navegación y índices ---
    toc: true
    toc-depth: 2                     # Profundidad del índice: hasta nivel de sección (1=capítulo, 2=sección).
    toc-title: "Índice"
    number-sections: false            # Activa la numeración automática de capítulos y secciones.
    lof-title: "Índice de Figuras"
    lot-title: "Índice de Tablas"
    lof: false                       # Desactivado (cambiar a true si el libro contiene figuras numeradas).
    lot: false                       # Desactivado (cambiar a true si el libro contiene tablas numeradas).

    # --- Gestión de Referencias y Citas ---
    csl: estilos/apa-6th-edition-es.csl
    bibliography: libro1_2026.bib
    nocite: "@*" # Descomenta esto si quieres toda la base de datos junta al final